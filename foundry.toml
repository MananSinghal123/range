[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
via_ir = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# ── Invariant campaign settings ────────────────────────────────────────────────
#
# Development profile: fast feedback, medium depth.
# Run with: forge test --match-contract InvariantTest
[profile.default.invariant]
runs  = 256    # sequences to generate
depth = 512    # calls per sequence
# fail_on_revert is intentionally false during development.
# Once handler revert rate is confirmed below ~10%, promote to the
# "ci" profile below and enable fail_on_revert = true.
fail_on_revert = false

# ── CI / long campaign profile ─────────────────────────────────────────────────
#
# Run with: FOUNDRY_PROFILE=ci forge test --match-contract InvariantTest
[profile.ci]
src            = "src"
out            = "out"
libs           = ["lib"]
optimizer      = true
optimizer_runs = 200
via_ir         = true

[profile.ci.invariant]
runs           = 1000  # high run count for thorough state-space exploration
depth          = 1000  # long call sequences to find deep invariant violations
fail_on_revert = true  # target state: no handler function should revert
